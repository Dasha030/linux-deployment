name: Continuous Integration & Deployment

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # ЕТАП 1: Лінтер та Тести (CI)
  test-and-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run code linter
        run: npm run lint

      - name: Run automated tests
        run: npm test

  # ЕТАП 2: Збірка образу в GHCR (CI)
  build-image:
    needs: test-and-lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=sha,format=long

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # ЕТАП 3: Автоматичний деплой на твій сервер (CD)
  deploy:
    needs: build-image
    runs-on: self-hosted # ВКАЗУЄМО ТВОЙ РАННЕР! Завдання виконається прямо в Ubuntu
    steps:
      - name: Log in to GitHub Container Registry
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Pull latest Docker image
        run: |
          # Переводимо назву репозиторію в нижній регістр для Docker
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          docker pull ghcr.io/$REPO_LOWER:latest

      - name: Stop and remove old container if exists
        run: |
          docker stop task-manager-cd || true
          docker rm task-manager-cd || true

      - name: Run new updated container
        run: |
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          # Запускаємо на порті 3040, щоб не конфліктувати з іншими лабами
          docker run -d -p 3040:3000 --name task-manager-cd --restart unless-stopped ghcr.io/$REPO_LOWER:latest

      # КРОК ВЕРИФІКАЦІЇ (Health Check) за методичкою викладача
      - name: Verify deployment status (Health Check)
        run: |
          echo "Waiting for app to start..."
          sleep 5
          # Робимо запит до нашого контейнера на порт 3040
          STATUS_CODE=$(curl -o /dev/null -s -w "%{http_code}" http://localhost:3040/)
          echo "App responded with status code: $STATUS_CODE"
          if [ "$STATUS_CODE" -ne 200 ]; then
            echo "Deployment Verification Failed!"
            exit 1
          fi
          echo "Deployment Verification Successful! Application is live!"
